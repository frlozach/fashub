<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAS Portal – Navigation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #eef0f6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .stage {
    position: relative;
    width: 620px;
    height: 620px;
  }

  #nav-svg { width: 100%; height: 100%; overflow: visible; }

  .link-dot { cursor: pointer; }
  .link-dot:hover { filter: brightness(1.25) drop-shadow(0 0 6px currentColor); }

  .branch-badge {
    position: absolute;
    background: #fff;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    box-shadow: 0 2px 14px rgba(0,0,0,0.13);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.85);
    transition: opacity .28s, transform .28s cubic-bezier(.34,1.56,.64,1);
    z-index: 50;
  }
  .branch-badge.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .link-tooltip {
    position: absolute;
    background: #fff;
    border-radius: 8px;
    padding: 6px 13px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.14);
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .16s, transform .16s;
    z-index: 200;
  }
  .link-tooltip.show { opacity: 1; transform: translateY(0); }

  .panel-area {
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 660px;
    padding: 0 1rem;
    margin-top: 0.6rem;
  }
  .pills-wrap {
    display: flex; flex-wrap: wrap; gap: 9px; justify-content: center;
    opacity: 0; transform: translateY(8px);
    transition: opacity .3s, transform .3s;
  }
  .pills-wrap.show { opacity: 1; transform: translateY(0); }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 20px; border-radius: 28px;
    font-size: 12.5px; font-weight: 600; color: #fff;
    cursor: pointer; text-decoration: none; border: none;
    transition: transform .18s, filter .18s;
    white-space: nowrap;
  }
  .pill:hover { transform: translateY(-2px); filter: brightness(1.1); }

  .hint {
    font-size: 11px; color: #bbb; letter-spacing: 0.05em; margin-top: 1.1rem;
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <svg id="nav-svg" viewBox="0 0 620 620"></svg>
</div>
<div class="panel-area">
  <div class="pills-wrap" id="pills-wrap"></div>
</div>
<p class="hint">Survolez une branche · les cercles se déploient vers l'extérieur</p>

<script>
// ════════════════════════════════════════════════════════════
//  ★  ZONE DE CONFIGURATION — modifiez uniquement cette section
// ════════════════════════════════════════════════════════════

const sections = [
  {
    label: "FAS Projects",
    color: "#4A6CF7",
    links: [
      { text: "Project Entry Form", url: "https://agilent.sharepoint.com/sites/fas-project-hub/_layouts/15/guestaccess.aspx?nav=YTQ5MzliMGMtNzgyZC00NjJjLWIyNjMtMTk3NjUyMTk3MDcw&share=JABgthBhbZG4T7L11VISovZkATmnrd7EQ_Y84rjIf1UKXd4" },
      { text: "Project Tracker",    url: "https://agilent.sharepoint.com/sites/fas-project-hub/Lists/FASProjectHub1/Grid%20View.aspx" }
    ]
  },
  {
    label: "Pathogen Initiative",
    color: "#0EA47A",
    links: [
      { text: "Seminars",      url: "https://agilent.sharepoint.com/sites/fas-project-hub/SitePages/Pathogens-Seminars.aspx" },
      { text: "Design Shared", url: "https://designservice.scs.agilent.com/projects/templates/wiki/Agilent_Pathogen_Designs" }
    ]
  },
  {
    label: "Genomic Protocols",
    color: "#8B44C8",
    links: [
      { text: "NGS PROTOCOLS", url: "https://agilent.sharepoint.com/:u:/r/sites/fas-project-hub/SitePages/PROTOCOLS_NGS.aspx?csf=1&web=1&e=FIKfuX" },
      { text: "MICROARRAY PROTOCOLS",    url: "https://agilent.sharepoint.com/:u:/r/sites/fas-project-hub/SitePages/PROTOCOLS_MicroArrays.aspx?csf=1&web=1&e=0DBe6Z" },
      { text: "AUTOMATION PROTOCOLS",    url: "https://agilent.sharepoint.com/:u:/r/sites/fas-project-hub/SitePages/PROTOCOLS_Automation.aspx?csf=1&web=1&e=GDiGfO" }
    ]
  },
  {
    label: "Bioinformatic",
    color: "#C8950A",
    links: [
      { text: "HEALTHOMICS",   url: "https://agilent.sharepoint.com/:u:/r/sites/fas-project-hub/SitePages/HEALTHOMICS.aspx?csf=1&web=1&e=U58X18" },
      { text: "Internal Tools",url: "https://agilent.sharepoint.com/:u:/r/sites/fas-project-hub/SitePages/INTERNAL-BIOIN.aspx?csf=1&web=1&e=X0TW1K" }
    ]
  },
  {
    label: "App Note",
    color: "#E8612A",
    links: [
      { text: "App Note List",       url: "https://agilent.sharepoint.com/:u:/r/sites/fas-project-hub/SitePages/AppNotes_MuA.aspx?csf=1&web=1&e=7Vj1IK" },
      { text: "App Note Entry Form", url: "https://agilent.sharepoint.com/sites/genomics-marketing/_layouts/15/listforms.aspx?cid=ZGRmN2FkM2EtMGRmZi00NzBmLWE5ODYtOWI2Y2UxNzU4ZDc3&ct=1778145263880&or=Teams-HL&nav=Y2VjNWUwN2QtODA3OS00ODliLWFlOTAtMTZjZjRlYWFjNDhj&LOF=1" },
	  { text: "Design service Published papers", url: "https://designservice.scs.agilent.com/projects/publications/wiki/Wiki" }
    ]
  },
  {
    label: "FAS other ressources",
    color: "#D63055",
    links: [
      { text: "Documents Hub", url: "https://agilent.sharepoint.com/sites/fas-project-hub/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2Ffas%2Dproject%2Dhub%2FShared%20Documents%2FProjects&viewid=4ed4acd3%2Dd249%2D4459%2D8d10%2Deaec5d4d6e8c" },
	  { text: "Design service", url: "https://designservice.scs.agilent.com/login" }
    ]
  }
];

// ════════════════════════════════════════════════════════════
//  FIN DE LA ZONE DE CONFIGURATION
// ════════════════════════════════════════════════════════════

const CX = 310, CY = 310;

// 6 branches evenly spaced at 60°, starting from top (270°)
const BRANCH_ANGLES = [270, 330, 30, 90, 150, 210];

// Dot geometry: index 0 = biggest/nearest (link), outward = smaller/decorative
const DOT_CONFIGS = [
  { r: 23, d: 62  },  // 0 — largest  ← 1st link
  { r: 17, d: 108 },  // 1 — medium   ← 2nd link
  { r: 12, d: 152 },  // 2 — small    ← 3rd link
  { r:  8, d: 190 },  // 3 — tiny (decorative)
  { r:  5, d: 222 },  // 4 — micro (decorative)
];

function getLinkDotIndices(numLinks) {
  return Array.from({ length: Math.min(numLinks, 3) }, (_, i) => i);
}

// ── BUILD ────────────────────────────────────────────────────
const svg       = document.getElementById('nav-svg');
const stage     = document.getElementById('stage');
const pillsWrap = document.getElementById('pills-wrap');

function toRad(deg) { return deg * Math.PI / 180; }
function ptOf(dist, angleDeg) {
  const r = toRad(angleDeg);
  return [CX + Math.cos(r) * dist, CY + Math.sin(r) * dist];
}

let activeIdx = -1, hideTimer = null;
const branchData = [];
const badges     = [];

// ── Active branches ──────────────────────────────────────────
sections.forEach((sec, si) => {
  const angleDeg = BRANCH_ANGLES[si];
  const rad      = toRad(angleDeg);
  const linkIdxs = getLinkDotIndices(sec.links.length);
  const dots     = [];

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.dataset.si = si;

  DOT_CONFIGS.forEach(({ r, d }, di) => {
    const [bx, by] = ptOf(d, angleDeg);
    const isLink   = linkIdxs.includes(di);
    const linkRank = linkIdxs.indexOf(di);

    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', bx);
    c.setAttribute('cy', by);
    c.setAttribute('r',  r);
    c.setAttribute('fill', sec.color);
    c.setAttribute('stroke', '#eef0f6');
    c.setAttribute('stroke-width', isLink ? '2.5' : '1.5');
    c.setAttribute('opacity', isLink ? '1' : '0.45');
    c.style.transition = [
      'cx .44s cubic-bezier(.34,1.56,.64,1)',
      'cy .44s cubic-bezier(.34,1.56,.64,1)',
      'r  .36s cubic-bezier(.34,1.56,.64,1)',
      'opacity .25s'
    ].join(', ');

    if (isLink) {
      c.classList.add('link-dot');
      const linkObj = sec.links[linkRank];

      c.addEventListener('mouseenter', e => {
        activate(si);
        showTip(e, linkObj.text, sec.color);
      });
      c.addEventListener('mouseleave', () => {
        hideTip();
        scheduleHide(si);
      });
      c.addEventListener('click', () => {
        window.open(linkObj.url, '_blank');
      });
    }

    g.appendChild(c);
    dots.push({ el: c, bx, by, r, isLink, d, rad });
  });

  g.addEventListener('mouseenter', () => activate(si));
  g.addEventListener('mouseleave', () => scheduleHide(si));
  svg.appendChild(g);
  branchData.push(dots);

  // Badge label at branch tip
  const [tipX, tipY] = ptOf(258, angleDeg);
  const badge = document.createElement('div');
  badge.className    = 'branch-badge';
  badge.style.color  = sec.color;
  badge.style.border = `1.5px solid ${sec.color}44`;
  badge.style.left   = (tipX / 620 * 100) + '%';
  badge.style.top    = (tipY / 620 * 100) + '%';
  badge.textContent  = sec.label;
  stage.appendChild(badge);
  badges.push(badge);
});

// ── Center circle (rendered last = on top) ──────────────────
const cg = document.createElementNS('http://www.w3.org/2000/svg','g');

const halo = document.createElementNS('http://www.w3.org/2000/svg','circle');
halo.setAttribute('cx',CX); halo.setAttribute('cy',CY); halo.setAttribute('r',48);
halo.setAttribute('fill','#dde2f2'); halo.setAttribute('opacity','0.65');
cg.appendChild(halo);

const disk = document.createElementNS('http://www.w3.org/2000/svg','circle');
disk.setAttribute('cx',CX); disk.setAttribute('cy',CY); disk.setAttribute('r',38);
disk.setAttribute('fill','#ffffff');
disk.setAttribute('stroke','#cdd4ee'); disk.setAttribute('stroke-width','1.5');
cg.appendChild(disk);

const lt = document.createElementNS('http://www.w3.org/2000/svg','text');
lt.setAttribute('x',CX); lt.setAttribute('y',CY-4);
lt.setAttribute('text-anchor','middle'); lt.setAttribute('dominant-baseline','central');
lt.style.cssText = 'font-size:17px;font-weight:800;fill:#1a1d2e;letter-spacing:-0.5px';
lt.textContent = 'FAS';
cg.appendChild(lt);

const sub = document.createElementNS('http://www.w3.org/2000/svg','text');
sub.setAttribute('x',CX); sub.setAttribute('y',CY+14);
sub.setAttribute('text-anchor','middle');
sub.style.cssText = 'font-size:7px;font-weight:700;fill:#8890b0;letter-spacing:0.13em';
sub.textContent = 'PORTAL';
cg.appendChild(sub);

svg.appendChild(cg);

// ── Tooltip ──────────────────────────────────────────────────
const tip = document.createElement('div');
tip.className = 'link-tooltip';
stage.appendChild(tip);

function showTip(e, text, color) {
  const rect = stage.getBoundingClientRect();
  tip.textContent = text;
  tip.style.borderLeft = `3px solid ${color}`;
  tip.style.left = (e.clientX - rect.left + 14) + 'px';
  tip.style.top  = (e.clientY - rect.top  - 40) + 'px';
  tip.classList.add('show');
}
function hideTip() { tip.classList.remove('show'); }

// ── Interaction ───────────────────────────────────────────────
const DEPLOY = 0.42;

function activate(si) {
  clearTimeout(hideTimer);
  if (activeIdx === si) return;
  if (activeIdx !== -1) collapse(activeIdx, true);
  activeIdx = si;

  // Dim other branches
  sections.forEach((_, j) => {
    if (j !== si) {
      const g = svg.querySelector(`g[data-si="${j}"]`);
      if (g) g.querySelectorAll('circle').forEach(c => c.style.opacity = '0.12');
    }
  });

  // Deploy with stagger
  branchData[si].forEach(({ el, d, rad, r, isLink }, di) => {
    setTimeout(() => {
      const nd = d * (1 + DEPLOY);
      el.setAttribute('cx', CX + Math.cos(rad) * nd);
      el.setAttribute('cy', CY + Math.sin(rad) * nd);
      el.setAttribute('r',  r * (isLink ? 1.40 : 1.18));
      el.setAttribute('opacity', isLink ? '1' : '0.65');
    }, di * 44);
  });

  badges[si].classList.add('show');

  // Pills
  pillsWrap.innerHTML = '';
  pillsWrap.classList.remove('show');
  sec = sections[si];
  sec.links.forEach((lk, k) => {
    setTimeout(() => {
      const a = document.createElement('a');
      a.className = 'pill';
      a.href = lk.url;
      a.target = '_blank';
      a.style.background = sec.color;
      a.style.boxShadow  = `0 4px 14px ${sec.color}55`;
      a.textContent = lk.text;
      pillsWrap.appendChild(a);
    }, k * 65 + 110);
  });
  setTimeout(() => pillsWrap.classList.add('show'), 80);
}

function collapse(si, silent) {
  branchData[si].forEach(({ el, bx, by, r, isLink }) => {
    el.style.transition = 'cx .32s ease, cy .32s ease, r .28s ease, opacity .22s';
    el.setAttribute('cx', bx);
    el.setAttribute('cy', by);
    el.setAttribute('r',  r);
    el.setAttribute('opacity', isLink ? '1' : '0.45');
  });
  badges[si].classList.remove('show');
  if (!silent) {
    sections.forEach((_, j) => {
      const g = svg.querySelector(`g[data-si="${j}"]`);
      if (g) g.querySelectorAll('circle').forEach(c => c.style.opacity = '');
    });
    pillsWrap.classList.remove('show');
    setTimeout(() => pillsWrap.innerHTML = '', 300);
    activeIdx = -1;
  }
}

function scheduleHide(si) {
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (activeIdx === si) collapse(si, false);
  }, 260);
}
</script>
</body>
</html>
